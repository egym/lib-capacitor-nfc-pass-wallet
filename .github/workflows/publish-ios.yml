name: Publish iOS SDK (SPM + CocoaPods)

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag (e.g. 0.1.0)
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift package
        run: swift build
        working-directory: packages/ios-sdk
      - name: Validate podspec
        run: pod lib lint EGYMNFCPassWallet.podspec --allow-warnings
        working-directory: packages/ios-sdk
      - name: Create git tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}
      - name: Push CocoaPod
        run: pod trunk push EGYMNFCPassWallet.podspec --allow-warnings
        working-directory: packages/ios-sdk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}

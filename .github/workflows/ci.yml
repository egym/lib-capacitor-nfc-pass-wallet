name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  npm:
    name: Capacitor Package Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm test

  android:
    name: Capacitor Android Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "23"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v5
      - run: yes | sdkmanager --licenses
      - run: gradle assemble
        working-directory: packages/capacitor/android
      - run: gradle test
        working-directory: packages/capacitor/android

  ios:
    name: Capacitor iOS Podspec Validation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: pod lib lint CapacitorNFCPassWallet.podspec --allow-warnings
        working-directory: packages/capacitor

  flutter:
    name: Flutter Plugin Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: packages/flutter
      - run: flutter analyze
        working-directory: packages/flutter
      - run: flutter test
        working-directory: packages/flutter

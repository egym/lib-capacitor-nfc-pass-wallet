name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  npm:
    name: Capacitor Package Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm test

  android:
    name: Capacitor Android Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "23"
      - uses: gradle/actions/setup-gradle@v5
      - name: Configure Android SDK
        run: |
          if [ -d /usr/local/lib/android/sdk ]; then
            echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
            echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
            echo "/usr/local/lib/android/sdk/platform-tools" >> "$GITHUB_PATH"
            echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          elif [ -n "$ANDROID_HOME" ]; then
            echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
            echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" >> "$GITHUB_ENV"
            echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
            echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          else
            echo "Android SDK not found on runner" >&2
            exit 1
          fi
      - run: yes | sdkmanager --licenses
      - run: gradle assemble
        working-directory: packages/capacitor/android
      - run: gradle test
        working-directory: packages/capacitor/android

  ios:
    name: Capacitor iOS Podspec Validation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: pod lib lint CapacitorNFCPassWallet.podspec --allow-warnings
        working-directory: packages/capacitor

  flutter:
    name: Flutter Plugin Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Flutter SDK
        run: |
          git clone https://github.com/flutter/flutter.git --branch stable --depth 1 "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"
      - run: flutter --version
      - run: flutter pub get
        working-directory: packages/flutter
      - run: flutter analyze
        working-directory: packages/flutter
      - run: flutter test
        working-directory: packages/flutter

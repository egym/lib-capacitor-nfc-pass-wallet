name: Publish npm (Capacitor + Contracts)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish from (optional)
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public --provenance
        working-directory: packages/capacitor-nfc-pass-wallet
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # TODO remove and replace with trusted publishing
